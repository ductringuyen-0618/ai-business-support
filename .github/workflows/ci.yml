name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel older runs on the same branch when a new commit lands.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast feedback: typecheck + lint + format + unit/integration tests. ~1 min.
  quality:
    name: Quality gates
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Unit + integration tests
        run: pnpm test

  # Slower: hermetic Playwright happy-path against ephemeral Postgres + dev server.
  # Mocks Anthropic / Resend / Twilio / Google in-process — no real secrets needed.
  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Postgres 16
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-16 postgresql-client-16
          echo "/usr/lib/postgresql/16/bin" >> $GITHUB_PATH

      - name: Install Playwright Chromium + OS deps
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright
        run: pnpm test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 14
